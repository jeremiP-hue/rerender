<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Gaming computer</title>
  <desc id="desc">A stylized gaming computer setup with a transparent background.</desc>
  <defs>
    <linearGradient id="case" x1="178" y1="86" x2="350" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="0.5" stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="glass" x1="202" y1="112" x2="326" y2="380" gradientUnits="userSpaceOnUse">
