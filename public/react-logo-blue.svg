<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Blue React logo</title>
  <desc id="desc">A circular blue React-inspired logo with an atom symbol in the center.</desc>
  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="78%">
      <stop offset="0" stop-color="#a5f3fc" />
      <stop offset="0.34" stop-color="#22d3ee" />
      <stop offset="0.68" stop-color="#2563eb" />
      <stop offset="1" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="ring" x1="92" y1="78" x2="420" y2="434" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecfeff" stop-opacity="0.9" />
      <stop offset="0.5" stop-color="#67e8f9" stop-opacity="0.55" />
      <stop offset="1" stop-color="#020617" stop-opacity="0.38" />
    </linearGradient>
    <linearGradient id="shine" x1="124" y1="88" x2="336" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.56" />
      <stop offset="0.72" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.42" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="badge">
      <circle cx="256" cy="256" r="226" />
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="226" fill="url(#bg)" filter="url(#shadow)" />
  <g clip-path="url(#badge)">
    <path d="M90 120C160 70 270 55 380 94C282 112 194 158 120 232C98 192 87 155 90 120Z" fill="url(#shine)" />
    <path d="M70 358C176 410 302 415 444 340V452C318 524 174 520 70 456Z" fill="#020617" opacity="0.2" />
    <circle cx="402" cy="116" r="86" fill="#38bdf8" opacity="0.1" />
    <circle cx="108" cy="404" r="118" fill="#020617" opacity="0.16" />
  </g>

  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#ring)" stroke-width="18" />
  <circle cx="256" cy="256" r="188" fill="none" stroke="#cffafe" stroke-width="2" opacity="0.24" />

  <g fill="none" stroke="#e0f2fe" stroke-width="16" filter="url(#glow)" opacity="0.95">
    <ellipse cx="256" cy="256" rx="145" ry="56" />
    <ellipse cx="256" cy="256" rx="145" ry="56" transform="rotate(60 256 256)" />
    <ellipse cx="256" cy="256" rx="145" ry="56" transform="rotate(120 256 256)" />
  </g>

  <g fill="none" stroke="#0ea5e9" stroke-width="5" opacity="0.85">
    <ellipse cx="256" cy="256" rx="145" ry="56" />
    <ellipse cx="256" cy="256" rx="145" ry="56" transform="rotate(60 256 256)" />
    <ellipse cx="256" cy="256" rx="145" ry="56" transform="rotate(120 256 256)" />
  </g>

  <circle cx="256" cy="256" r="28" fill="#e0f2fe" />
  <circle cx="256" cy="256" r="16" fill="#38bdf8" />
</svg>
