<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Game console</title>
  <desc id="desc">A stylized modern game console and controller with a transparent background.</desc>
  <defs>
    <linearGradient id="consoleBody" x1="144" y1="78" x2="356" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334155" />
      <stop offset="0.52" stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="panel" x1="210" y1="82" x2="320" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38" />
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="neon" x1="150" y1="96" x2="356" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9" />
      <stop offset="0.55" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="260" cy="450" rx="172" ry="30" fill="#020617" opacity="0.24" />

  <g>
    <rect x="154" y="58" width="204" height="328" rx="34" fill="url(#consoleBody)" stroke="#38bdf8" stroke-width="8" />
    <path d="M212 72C242 160 242 284 212 372" fill="none" stroke="url(#neon)" stroke-width="10" stroke-linecap="round" filter="url(#glow)" />
    <rect x="226" y="92" width="92" height="252" rx="22" fill="url(#panel)" stroke="#1e40af" stroke-width="4" />
    <circle cx="318" cy="82" r="8" fill="#67e8f9" filter="url(#glow)" />
    <g stroke="#64748b" stroke-width="7" stroke-linecap="round" opacity="0.75">
      <path d="M248 126H300" />
      <path d="M248 156H300" />
      <path d="M248 186H300" />
      <path d="M248 216H300" />
    </g>
    <rect x="250" y="314" width="46" height="10" rx="5" fill="#67e8f9" opacity="0.8" />
  </g>

  <g filter="url(#glow)">
    <path d="M94 338C111 304 159 302 191 326C209 339 229 339 249 326C282 303 330 305 348 338C369 376 333 418 296 402C268 390 251 381 220 381C188 381 169 391 143 403C106 420 73 378 94 338Z" fill="#0f172a" stroke="#38bdf8" stroke-width="8" />
    <circle cx="174" cy="356" r="18" fill="#111827" stroke="#e0f2fe" stroke-width="6" />
    <path d="M134 358H166M150 342V374" stroke="#e0f2fe" stroke-width="9" stroke-linecap="round" />
    <circle cx="274" cy="344" r="9" fill="#67e8f9" />
    <circle cx="302" cy="356" r="9" fill="#a78bfa" />
    <circle cx="276" cy="374" r="9" fill="#60a5fa" />
    <circle cx="248" cy="356" r="9" fill="#22d3ee" />
    <rect x="202" y="352" width="38" height="14" rx="7" fill="#334155" stroke="#93c5fd" stroke-width="4" />
  </g>
</svg>
